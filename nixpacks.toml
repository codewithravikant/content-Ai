# Nixpacks configuration for Railway auto-detection
# Nix `python311` alone does not ship `pip` as a module — include `python311Packages.pip`
# or the build fails with: No module named pip

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "python311Packages.wheel", "nodejs-18_x"]

[phases.install]
cmds = [
    "cd backend && python3 -m pip install --upgrade pip setuptools wheel",
    "cd backend && python3 -m pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

# Must use `sh -c` so `cd` runs inside a shell (Railway runs start commands in exec form; `cd` is not a binary).
# Nixpacks runs from repo root; Python package lives under backend/.
[start]
cmd = "sh -c \"cd backend && exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips=*\""
