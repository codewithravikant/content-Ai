# Nixpacks configuration for Railway auto-detection
#
# Nix's python311 is PEP 668 "externally managed": system pip/get-pip cannot
# install into that interpreter. A local venv is not externally managed, so
# pip installs work there.

[phases.setup]
nixPkgs = ["python311", "nodejs-18_x"]

[phases.install]
cmds = [
    "cd backend && python3 -m venv .venv && .venv/bin/pip install --upgrade pip && .venv/bin/pip install -r requirements.txt",
    "cd frontend && npm ci",
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
]

[start]
cmd = "cd backend && exec .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
