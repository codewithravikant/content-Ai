# Railway configuration for multi-service deployment
# This file helps Railway understand the project structure

# Use the repo-root Dockerfile so `pip` comes from the official Python image (avoids Nix “no module named pip”).
# To use Nixpacks instead, set builder = "NIXPACKS" and ensure nixpacks.toml lists python311Packages.pip.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Docker image WORKDIR is /app with backend code at repo root of COPY — do not use `cd` as a raw start command.
startCommand = "sh -c \"exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips='*'\""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
