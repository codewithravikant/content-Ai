# Nixpacks configuration for Backend service on Railway
#
# Nix python311 has no pip module; bootstrap before pip install.
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
    "python3 -c \"import urllib.request; urllib.request.urlretrieve('https://bootstrap.pypa.io/get-pip.py', 'get-pip.py')\" && python3 get-pip.py && rm -f get-pip.py",
    "python3 -m pip install -r requirements.txt",
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
