# Nixpacks configuration for Backend service on Railway (service root = backend/)
# Nix python311 needs pip bundled explicitly.

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools", "python311Packages.wheel"]

[phases.install]
cmds = [
    "python3 -m pip install --upgrade pip setuptools wheel",
    "python3 -m pip install -r requirements.txt",
]

[start]
cmd = "bash railway-entry.sh"
