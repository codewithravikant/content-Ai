# Nixpacks for a Railway service whose root directory is `backend/`.
#
# Nix python311 is PEP 668 externally managed; use a venv for dependencies.

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
    "python3 -m venv .venv && .venv/bin/pip install --upgrade pip && .venv/bin/pip install -r requirements.txt",
]

[start]
cmd = "bash railway-entry.sh"
